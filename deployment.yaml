apiVersion: apps/v1
kind: Deployment
metadata:
   name: myweb-deployment

spec:
  replicas: 3   

  selector:
    matchLabels:
      app: myweb

  template:
    metadata:
      labels:
        app: myweb

    spec:
      containers:
      - name: myweb
        image: myweb
        imagePullPolicy: Never
        ports:
        - containerPort: 80
